<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinSanté | Catalogue des Médicaments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES GLOBALES --- */
        :root {
            --primary: #0284c7;
            --secondary: #0ea5e9;
            --dark: #0f172a;
            --light: #f8fafc;
            --white: #ffffff;
            --gray: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); line-height: 1.6; }

        /* --- NAVIGATION (COMMUNE) --- */
        header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--primary); letter-spacing: -1px; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .hamburger { display: none; font-size: 24px; cursor: pointer; color: var(--primary); }

        /* --- TITRE DE PAGE --- */
        .page-title { 
            text-align: center; margin-top: 50px; margin-bottom: 10px; 
            font-size: 2.5rem; color: var(--dark); letter-spacing: -1px; 
        }
        .subtitle { text-align: center; color: var(--gray); margin-bottom: 30px; }

        /* --- RECHERCHE --- */
        .search-container { max-width: 600px; margin: 0 auto 40px auto; padding: 0 20px; }
        #searchInput { 
            width: 100%; padding: 18px 25px; border-radius: 50px; 
            border: 2px solid transparent; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            font-size: 1rem; outline: none; transition: 0.3s; background: white;
        }
        #searchInput:focus { border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        /* --- GRILLE --- */
        .grid-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; padding: 20px 5%; max-width: 1200px; margin: 0 auto 50px;
        }
        .card { 
            background: var(--white); border-radius: 24px; padding: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.03); transition: 0.3s; border: 1px solid rgba(0,0,0,0.03);
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }
        .card h3 { font-size: 1.3rem; margin-bottom: 10px; }
        .card p { color: var(--gray); font-size: 0.9rem; margin-bottom: 20px; flex-grow: 1; }
        .btn-cta { 
            background: var(--primary); color: white; text-align: center; 
            padding: 15px; border-radius: 12px; text-decoration: none; 
            font-weight: 700; transition: 0.3s;
        }
        .btn-cta:hover { background: var(--secondary); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-links { 
                display: none; flex-direction: column; position: absolute; top: 80px; left: 0; 
                width: 100%; background: white; padding: 40px; text-align: center;
                box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            }
            .nav-links.active { display: flex; gap: 25px; }
            .hamburger { display: block; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KinSanté</div>
        <div class="hamburger" onclick="document.getElementById('nav').classList.toggle('active')"><i class="fas fa-bars"></i></div>
        <nav>
            <ul class="nav-links" id="nav">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="sante.html">Santé</a></li>
                <li><a href="medicaments.html">Médicaments</a></li>
                <li><a href="recommandations.html">Recommandés</a></li>
                <li><a href="communique.html">Communiqués</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Catalogue des Médicaments</h1>
        <p class="subtitle">Recherchez et commandez vos produits de santé facilement.</p>

        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchMed()" placeholder="Rechercher un médicament...">
        </div>

        <div class="grid-container" id="medList">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?w=500" alt="Med">
                <h3>Paracétamol 500mg</h3>
                <p>Antalgique pour douleurs légères et fièvre.</p>
                <a href="https://wa.me/243819679859" class="btn-cta">Commander</a>
            </div>
        </div>
    </main>

    <script>
        // Fonction Recherche
        function searchMed() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                let name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(input) ? "" : "none";
            });
        }
    </script>
</body>
</html>
