<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinSanté | Annuaire Santé</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #0284c7; --dark: #0f172a; --light: #f8fafc; --white: #ffffff; --gray: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); line-height: 1.6; }

        /* Navigation */
        header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--primary); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.9rem; }
        .hamburger { display: none; font-size: 24px; cursor: pointer; color: var(--primary); }

        /* Recherche */
        .page-title { text-align: center; margin: 50px 0 20px; }
        .search-wrapper { max-width: 600px; margin: 0 auto 40px; padding: 0 20px; }
        #searchBar { width: 100%; padding: 18px 25px; border-radius: 50px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); font-size: 1rem; outline: none; }

        /* Grille Annuaire */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px 5%; max-width: 1200px; margin: 0 auto 50px; }
        .card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.03); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 15px; }
        .category { background: #e0f2fe; color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .card h3 { margin: 10px 0; }
        .btn-cta { display: block; background: var(--primary); color: white; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 700; margin-top: 15px; }

        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 80px; left: 0; width: 100%; background: white; padding: 40px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
            .nav-links.active { display: flex; gap: 25px; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KinSanté</div>
        <div class="hamburger" onclick="document.getElementById('nav').classList.toggle('active')"><i class="fas fa-bars"></i></div>
        <nav>
            <ul class="nav-links" id="nav">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="sante.html">Santé</a></li>
                <li><a href="medicaments.html">Médicaments</a></li>
                <li><a href="recommandations.html">Recommandés</a></li>
                <li><a href="communique.html">Communiqués</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Annuaire Santé</h1>
        
        <div class="search-wrapper">
            <input type="text" id="searchBar" onkeyup="filterAnnuaire()" placeholder="Rechercher (ex: Dentiste, Clinique, Hôpital)...">
        </div>

        <div class="grid-container" id="annuaireList">
            <div class="card">
                <span class="category">Clinique</span>
                <img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?w=500" alt="Clinique">
                <h3>Centre Ngaliema</h3>
                <p>Soins d'urgence et chirurgie 24/7.</p>
                <a href="https://wa.me/243819679859" class="btn-cta">Contacter</a>
            </div>
        </div>
    </main>

    <script>
        function filterAnnuaire() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                // On cherche dans tout le contenu de la carte (Catégorie, Titre, Description)
                let text = card.innerText.toLowerCase();
                card.style.display = text.includes(input) ? "" : "none";
            });
        }
    </script>
</body>
</html>
